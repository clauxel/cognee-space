name = "cognee-space"
main = "worker/index.js"
compatibility_date = "2026-06-25"
workers_dev = true
routes = [
  { pattern = "cognee.space/*", zone_name = "cognee.space" },
  { pattern = "www.cognee.space/*", zone_name = "cognee.space" }
]

[vars]
APP_ORIGIN = "https://cognee.space"
CANONICAL_HOST = "cognee.space"
SITE_MODE = "independent_reference"

[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "cognee-space-analytics"
database_id = "43ba68cd-a7b2-401a-a462-d27219c524d3"

[assets]
directory = "./public"
binding = "SITE_ASSETS"
not_found_handling = "none"
run_worker_first = [
  "/*"
]
